<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargadores EV - Cadrete</title>
  <style>
    :root {
      --available: #22c55e;
      --charging:  #f59e0b;
      --unknown:   #94a3b8;
      --outoforder:#ef4444;
      --bg:        #0f172a;
      --card:      #1e293b;
      --border:    #334155;
      --text:      #f1f5f9;
      --muted:     #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p  { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }

    #autoreload-btn {
      margin-top: 0.75rem;
      padding: 0.3rem 0.9rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #autoreload-btn.on {
      border-color: var(--available);
      color: var(--available);
    }

    .stations {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto 2.5rem;
    }

    .station-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }

    .station-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .station-title { font-weight: 600; font-size: 1rem; }
    .station-addr  { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }

    .evse-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .evse-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f172a;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.85rem;
    }

    .evse-left   { display: flex; align-items: center; gap: 0.5rem; }
    .evse-dot    { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .evse-id     { color: var(--muted); font-size: 0.75rem; }
    .evse-right  { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .evse-status { font-weight: 600; font-size: 0.8rem; }
    .evse-info   { color: var(--muted); font-size: 0.7rem; }

    /* History section */
    .history-section {
      max-width: 960px;
      margin: 0 auto;
    }

    .history-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .heatmap-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .heatmap-block-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .heatmap-evse { margin-bottom: 1.25rem; }
    .heatmap-evse:last-child { margin-bottom: 0; }

    .heatmap-evse-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .heatmap-scroll {
      overflow-x: auto;
      border-radius: 4px;
    }

    .heatmap-scroll canvas { display: block; }

    /* 24h bar */
    .bar-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .bar-block-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; }
    .bar-evse        { margin-bottom: 0.75rem; }
    .bar-evse:last-child { margin-bottom: 0; }
    .bar-evse-label  { font-size: 0.7rem; color: var(--muted); margin-bottom: 3px; }
    .bar-strip {
      display: flex;
      height: 20px;
      border-radius: 4px;
      overflow: hidden;
      gap: 1px;
      background: var(--border);
    }
    .bar-cell { flex: 1; min-width: 1px; }
    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 3px;
    }

    /* Price charts */
    .price-charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .price-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .price-card-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; }
    .price-chart-wrap { overflow-x: auto; }
    .price-chart-wrap canvas { display: block; }

    /* Tooltip */
    #heatmap-tooltip {
      position: fixed;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.72rem;
      color: var(--text);
      pointer-events: none;
      display: none;
      z-index: 100;
      white-space: nowrap;
      line-height: 1.5;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin: 1.5rem 0;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .legend-dot  { width: 10px; height: 10px; border-radius: 50%; }

    .error-msg {
      text-align: center;
      color: var(--muted);
      padding: 3rem;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-available { background: #16532d; color: #4ade80; }
    .badge-charging  { background: #78350f; color: #fcd34d; }
    .badge-unknown   { background: #1e293b; color: #94a3b8; border: 1px solid var(--border); }
    .badge-outoforder{ background: #7c2d12; color: #fb923c; }

    @media (max-width: 500px) {
      .evse-row { flex-direction: column; align-items: flex-start; gap: 0.4rem; }
      .evse-right { align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <h1>Cargadores EV &mdash; Cadrete</h1>
  <p id="last-update">Cargando datos...</p>
  <button id="autoreload-btn" onclick="toggleAutoReload()">Auto-refresco: OFF</button>
</header>

<div id="stations" class="stations"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--available)"></div> Disponible</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--charging)"></div> Ocupado</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--outoforder)"></div> Fuera de servicio</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--unknown)"></div> Desconocido</div>
</div>

<div class="history-section">
  <h2>Últimas 24 horas</h2>
  <div id="history-24h"></div>
</div>

<div class="history-section" style="margin-top:2rem">
  <h2>Últimos 90 días</h2>
  <div id="history-90d"></div>
  <h2 style="margin-top:1.5rem">Evolución de precios</h2>
  <div class="price-charts" id="price-charts"></div>
</div>

<div class="history-section" style="margin-top:2rem">
  <h2>Últimas sesiones de carga</h2>
  <div id="sessions"></div>
</div>

<div id="heatmap-tooltip"></div>

<script>
  const STATUS_COLOR = {
    AVAILABLE:   'var(--available)',
    OCCUPIED:    'var(--charging)',
    OUTOFSERVICE:'var(--outoforder)',
    UNKNOWN:     'var(--unknown)',
  };

  function statusColor(s) {
    return STATUS_COLOR[s] || STATUS_COLOR.UNKNOWN;
  }

  function statusBadgeClass(s) {
    if (s === 'AVAILABLE')    return 'badge-available';
    if (s === 'OCCUPIED')     return 'badge-charging';
    if (s === 'OUTOFSERVICE') return 'badge-outoforder';
    return 'badge-unknown';
  }

  function statusLabel(s) {
    const labels = {
      AVAILABLE:    'Disponible',
      OCCUPIED:     'Ocupado',
      OUTOFSERVICE: 'Fuera de servicio',
      UNKNOWN:      'Desconocido',
    };
    return labels[s] || s;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString('es-ES', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit',
      timeZoneName: 'short',
    });
  }

  function shortEvseId(evseId) {
    // Return last segment after last *
    const parts = evseId.split('*');
    return `Conector ${parts[parts.length - 1]}`;
  }

  function renderStations(stations) {
    const container = document.getElementById('stations');
    container.innerHTML = '';

    stations.forEach(station => {
      const card = document.createElement('div');
      card.className = 'station-card';

      const evseRows = station.evses.map(evse => {
        const plug = evse.plugs[0] || {};
        const price = plug.price != null
          ? `${(plug.price / 100).toFixed(2)} ${plug.currency}/${plug.typePrice}`
          : '';
        const power = plug.maxPower ? `${plug.maxPower} kW` : '';
        const info = [plug.typology, power, price].filter(Boolean).join(' &middot; ');

        return `
          <div class="evse-row">
            <div class="evse-left">
              <div class="evse-dot" style="background:${statusColor(evse.status)}"></div>
              <span class="evse-id">${shortEvseId(evse.evseId)}</span>
            </div>
            <div class="evse-right">
              <span class="badge ${statusBadgeClass(evse.status)}">${statusLabel(evse.status)}</span>
              ${info ? `<span class="evse-info">${info}</span>` : ''}
            </div>
          </div>`;
      }).join('');

      const stationName = station.name || `Cargador ${station.id.slice(-6)}`;

      card.innerHTML = `
        <div class="station-header">
          <div class="status-dot" style="background:${statusColor(station.status)}"></div>
          <div>
            <div class="station-title">${stationName}</div>
            <div class="station-addr">${station.street || station.city}</div>
          </div>
        </div>
        <div class="evse-list">${evseRows}</div>`;

      container.appendChild(card);
    });
  }

  // --- Heatmap constants ---
  const CELL_W    = 10;
  const CELL_H    = 10;
  const PAD_LEFT  = 30;  // space for hour labels
  const PAD_TOP   = 28;  // space for day labels

  // Resolved hex colors for canvas (CSS vars don't work on canvas)
  const CANVAS_COLOR = {
    AVAILABLE:    '#22c55e',
    OCCUPIED:     '#f59e0b',
    OUTOFSERVICE: '#ef4444',
    UNKNOWN:      '#94a3b8',
    NODATA:       '#1e293b',
  };

  function buildHeatmap(evseId, history) {
    // Map: day (YYYY-MM-DD) -> hour (0-23) -> { AVAILABLE, OCCUPIED, OUTOFSERVICE, UNKNOWN }
    const data = new Map();
    history.forEach(entry => {
      const d    = new Date(entry.timestamp);
      const day  = d.toISOString().slice(0, 10);
      const hour = d.getUTCHours();
      entry.stations.forEach(st => {
        st.evses.forEach(ev => {
          if (ev.evseId !== evseId) return;
          if (!data.has(day)) data.set(day, new Map());
          const hourMap = data.get(day);
          if (!hourMap.has(hour)) hourMap.set(hour, { AVAILABLE: 0, OCCUPIED: 0, OUTOFSERVICE: 0, UNKNOWN: 0 });
          const counts = hourMap.get(hour);
          counts[ev.status] = (counts[ev.status] || 0) + 1;
        });
      });
    });
    return data;
  }

  function drawHeatmap(canvas, heatData) {
    const days   = Array.from(heatData.keys()).sort();
    const width  = PAD_LEFT + days.length * CELL_W;
    const height = PAD_TOP  + 24 * CELL_H;

    canvas.width  = width;
    canvas.height = height;

    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, width, height);

    // Hour labels (left, every 3h)
    ctx.fillStyle = '#64748b';
    ctx.font = '8px monospace';
    ctx.textAlign = 'right';
    for (let h = 0; h < 24; h += 3) {
      const y = PAD_TOP + h * CELL_H + CELL_H - 2;
      ctx.fillText(`${String(h).padStart(2, '0')}h`, PAD_LEFT - 3, y);
    }

    // Day labels (top, every 7 days)
    ctx.textAlign = 'left';
    days.forEach((day, i) => {
      if (i % 7 !== 0) return;
      ctx.save();
      ctx.translate(PAD_LEFT + i * CELL_W + CELL_W / 2, PAD_TOP - 4);
      ctx.rotate(-Math.PI / 3);
      ctx.fillStyle = '#64748b';
      ctx.font = '8px monospace';
      ctx.fillText(day.slice(5), 0, 0); // MM-DD
      ctx.restore();
    });

    // Cells
    days.forEach((day, di) => {
      const hourMap = heatData.get(day);
      for (let h = 0; h < 24; h++) {
        let color = CANVAS_COLOR.NODATA;
        const counts = hourMap && hourMap.get(h);
        if (counts) {
          const dominant = Object.entries(counts).reduce((a, b) => b[1] > a[1] ? b : a)[0];
          color = CANVAS_COLOR[dominant] || CANVAS_COLOR.UNKNOWN;
        }
        ctx.fillStyle = color;
        ctx.fillRect(PAD_LEFT + di * CELL_W, PAD_TOP + h * CELL_H, CELL_W - 1, CELL_H - 1);
      }
    });

    return days; // return for hit-testing
  }

  function attachTooltip(canvas, heatData, days) {
    const tooltip = document.getElementById('heatmap-tooltip');

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const mx   = e.clientX - rect.left;
      const my   = e.clientY - rect.top;
      const di   = Math.floor((mx - PAD_LEFT) / CELL_W);
      const hi   = Math.floor((my - PAD_TOP)  / CELL_H);

      if (di < 0 || di >= days.length || hi < 0 || hi >= 24) {
        tooltip.style.display = 'none';
        return;
      }

      const day     = days[di];
      const hourMap = heatData.get(day);
      const counts  = hourMap && hourMap.get(hi);

      let lines = `<strong>${day} — ${String(hi).padStart(2,'0')}:00–${String(hi).padStart(2,'0')}:59</strong>`;
      if (counts) {
        const total = Object.values(counts).reduce((a, b) => a + b, 0);
        const pct   = s => total ? Math.round(counts[s] / total * 100) : 0;
        lines += `<br>Disponible: ${pct('AVAILABLE')}%`;
        lines += `<br>Ocupado: ${pct('OCCUPIED')}%`;
        if (counts.OUTOFSERVICE) lines += `<br>Fuera de servicio: ${pct('OUTOFSERVICE')}%`;
      } else {
        lines += '<br><em>Sin datos</em>';
      }

      tooltip.innerHTML  = lines;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top  = (e.clientY + 12) + 'px';
    });

    canvas.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  }

  // Line chart palette per EVSE index
  const LINE_COLORS = ['#38bdf8', '#a78bfa'];

  function renderPriceCharts(stations, history) {
    const container = document.getElementById('price-charts');
    container.innerHTML = '';

    stations.forEach((station, si) => {
      const card = document.createElement('div');
      card.className = 'price-card';

      const stationName = station.name || `Cargador ${station.id.slice(-6)}`;
      const title = document.createElement('div');
      title.className = 'price-card-title';
      title.textContent = stationName;
      card.appendChild(title);

      // Collect price series per evseId from history
      const series = {}; // evseId -> [{ts, price}]
      history.forEach(entry => {
        entry.stations.forEach(st => {
          if (st.id !== station.id) return;
          st.evses.forEach(ev => {
            if (ev.price == null) return;
            if (!series[ev.evseId]) series[ev.evseId] = [];
            series[ev.evseId].push({ ts: new Date(entry.timestamp).getTime(), price: ev.price / 100 });
          });
        });
      });

      const evseIds = Object.keys(series);
      if (evseIds.length === 0) {
        const msg = document.createElement('p');
        msg.style.cssText = 'color:var(--muted);font-size:0.8rem';
        msg.textContent = 'Sin datos de precio aún.';
        card.appendChild(msg);
        container.appendChild(card);
        return;
      }

      // Canvas dimensions
      const PAD = { top: 10, right: 16, bottom: 32, left: 46 };
      const W = 420, H = 160;

      const wrap = document.createElement('div');
      wrap.className = 'price-chart-wrap';
      const canvas = document.createElement('canvas');
      canvas.width  = W;
      canvas.height = H;
      wrap.appendChild(canvas);
      card.appendChild(wrap);

      // Legend
      const legend = document.createElement('div');
      legend.style.cssText = 'display:flex;gap:1rem;margin-top:8px;flex-wrap:wrap';
      evseIds.forEach((id, i) => {
        const item = document.createElement('div');
        item.style.cssText = 'display:flex;align-items:center;gap:4px;font-size:0.7rem;color:var(--muted)';
        item.innerHTML = `<div style="width:12px;height:3px;background:${LINE_COLORS[i % LINE_COLORS.length]};border-radius:2px"></div>${shortEvseId(id)}`;
        legend.appendChild(item);
      });
      card.appendChild(legend);
      container.appendChild(card);

      // Draw
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, W, H);

      // Global time + price range across all series
      let tsMin = Infinity, tsMax = -Infinity, pMin = Infinity, pMax = -Infinity;
      evseIds.forEach(id => {
        series[id].forEach(p => {
          if (p.ts    < tsMin) tsMin = p.ts;
          if (p.ts    > tsMax) tsMax = p.ts;
          if (p.price < pMin)  pMin  = p.price;
          if (p.price > pMax)  pMax  = p.price;
        });
      });

      // Add padding to Y so a flat line isn't stuck at edge
      const yRange = pMax - pMin || 0.1;
      pMin = Math.max(0, pMin - yRange * 0.2);
      pMax = pMax + yRange * 0.2;
      const tsRange = tsMax - tsMin || 1;

      const chartW = W - PAD.left - PAD.right;
      const chartH = H - PAD.top  - PAD.bottom;

      const toX = ts    => PAD.left + (ts - tsMin) / tsRange * chartW;
      const toY = price => PAD.top  + chartH - (price - pMin) / (pMax - pMin) * chartH;

      // Grid lines + Y labels
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 0.5;
      ctx.fillStyle = '#64748b';
      ctx.font = '9px monospace';
      ctx.textAlign = 'right';
      const yTicks = 4;
      for (let i = 0; i <= yTicks; i++) {
        const price = pMin + (pMax - pMin) * (i / yTicks);
        const y = toY(price);
        ctx.beginPath();
        ctx.moveTo(PAD.left, y);
        ctx.lineTo(W - PAD.right, y);
        ctx.stroke();
        ctx.fillText(`${price.toFixed(2)}€`, PAD.left - 4, y + 3);
      }

      // X axis labels (up to 5 ticks)
      ctx.textAlign = 'center';
      const xTicks = Math.min(5, evseIds.length > 0 ? series[evseIds[0]].length : 1);
      for (let i = 0; i <= xTicks; i++) {
        const ts = tsMin + tsRange * (i / xTicks);
        const x  = toX(ts);
        const d  = new Date(ts);
        const label = `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}h`;
        ctx.fillStyle = '#64748b';
        ctx.font = '8px monospace';
        ctx.fillText(label, x, H - 6);
      }

      // Axes
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(PAD.left, PAD.top);
      ctx.lineTo(PAD.left, H - PAD.bottom);
      ctx.lineTo(W - PAD.right, H - PAD.bottom);
      ctx.stroke();

      // Lines
      evseIds.forEach((id, i) => {
        const pts = series[id];
        if (pts.length < 2) return;
        ctx.strokeStyle = LINE_COLORS[i % LINE_COLORS.length];
        ctx.lineWidth = 1.5;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        pts.forEach((p, j) => {
          const x = toX(p.ts);
          const y = toY(p.price);
          j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
      });

      // Tooltip
      const tooltip = document.getElementById('heatmap-tooltip');
      canvas.addEventListener('mousemove', e => {
        const rect  = canvas.getBoundingClientRect();
        const mx    = (e.clientX - rect.left) * (W / rect.width);
        if (mx < PAD.left || mx > W - PAD.right) { tooltip.style.display = 'none'; return; }
        const ts    = tsMin + (mx - PAD.left) / chartW * tsRange;
        // Find nearest point across all series
        let best = null, bestDist = Infinity;
        evseIds.forEach((id, i) => {
          series[id].forEach(p => {
            const dist = Math.abs(p.ts - ts);
            if (dist < bestDist) { bestDist = dist; best = { ...p, evseId: id, color: LINE_COLORS[i % LINE_COLORS.length] }; }
          });
        });
        if (!best) { tooltip.style.display = 'none'; return; }
        const d = new Date(best.ts);
        tooltip.innerHTML = `<strong>${shortEvseId(best.evseId)}</strong><br>${formatDate(d.toISOString())}<br><span style="color:${best.color}">${best.price.toFixed(2)} €/kWh</span>`;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top  = (e.clientY + 12) + 'px';
      });
      canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
    });
  }

  function render24h(stations, history) {
    const container = document.getElementById('history-24h');
    container.innerHTML = '';

    const cutoff = Date.now() - 24 * 60 * 60 * 1000;
    const recent = history.filter(e => new Date(e.timestamp).getTime() >= cutoff);

    if (recent.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">Sin datos en las últimas 24 h.</p>';
      return;
    }

    // Build per-evse entries
    const evseEntries = {};
    recent.forEach(entry => {
      entry.stations.forEach(st => {
        st.evses.forEach(ev => {
          if (!evseEntries[ev.evseId]) evseEntries[ev.evseId] = [];
          evseEntries[ev.evseId].push({ timestamp: entry.timestamp, status: ev.status });
        });
      });
    });

    stations.forEach(station => {
      const block = document.createElement('div');
      block.className = 'bar-block';
      const stationName = station.name || `Cargador ${station.id.slice(-6)}`;
      let html = `<div class="bar-block-title">${stationName}</div>`;

      station.evses.forEach(evse => {
        const entries = evseEntries[evse.evseId] || [];
        const cells = entries.map(e =>
          `<div class="bar-cell" style="background:${statusColor(e.status)}" title="${statusLabel(e.status)} — ${formatDate(e.timestamp)}"></div>`
        ).join('');
        const t0 = entries.length ? formatDate(entries[0].timestamp) : '';
        const t1 = entries.length ? formatDate(entries[entries.length - 1].timestamp) : '';
        html += `
          <div class="bar-evse">
            <div class="bar-evse-label">${shortEvseId(evse.evseId)}</div>
            <div class="bar-strip">${cells || '<div style="flex:1;background:var(--border)"></div>'}</div>
            <div class="bar-labels"><span>${t0}</span><span>${t1}</span></div>
          </div>`;
      });

      block.innerHTML = html;
      container.appendChild(block);
    });
  }

  function renderHistory(stations, history) {
    const container = document.getElementById('history-90d');
    container.innerHTML = '';

    if (history.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">Sin historial aún. Los datos se acumularán con el tiempo.</p>';
      return;
    }

    stations.forEach(station => {
      const block = document.createElement('div');
      block.className = 'heatmap-block';

      const stationName = station.name || `Cargador ${station.id.slice(-6)}`;
      const title = document.createElement('div');
      title.className = 'heatmap-block-title';
      title.textContent = stationName;
      block.appendChild(title);

      station.evses.forEach(evse => {
        const wrap = document.createElement('div');
        wrap.className = 'heatmap-evse';

        const label = document.createElement('div');
        label.className = 'heatmap-evse-label';
        label.textContent = shortEvseId(evse.evseId) + ' — eje X: días · eje Y: hora del día (UTC)';
        wrap.appendChild(label);

        const scroll = document.createElement('div');
        scroll.className = 'heatmap-scroll';

        const canvas = document.createElement('canvas');
        scroll.appendChild(canvas);
        wrap.appendChild(scroll);
        block.appendChild(wrap);

        const heatData = buildHeatmap(evse.evseId, history);
        const days = drawHeatmap(canvas, heatData);
        attachTooltip(canvas, heatData, days);
      });

      container.appendChild(block);
    });
  }

  function renderSessions(stations, history) {
    const container = document.getElementById('sessions');
    container.innerHTML = '';

    if (history.length === 0) {
      container.innerHTML = '<p style="color:var(--muted);font-size:0.85rem">Sin historial aún.</p>';
      return;
    }

    // Collect all evseIds in display order
    const evseOrder = [];
    stations.forEach(st => st.evses.forEach(ev => evseOrder.push({ evseId: ev.evseId, stationName: st.name || st.id })));

    // Build per-evse session list from history (oldest→newest)
    const sorted = [...history].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

    evseOrder.forEach(({ evseId, stationName }) => {
      const sessions = [];
      let sessionStart = null;

      sorted.forEach(entry => {
        const st = entry.stations.find(s => s.evses.some(e => e.evseId === evseId));
        if (!st) return;
        const ev = st.evses.find(e => e.evseId === evseId);
        if (!ev) return;
        const occupied = ev.status === 'OCCUPIED';

        if (occupied && sessionStart === null) {
          sessionStart = entry.timestamp;
        } else if (!occupied && sessionStart !== null) {
          sessions.push({ start: sessionStart, end: entry.timestamp, ongoing: false });
          sessionStart = null;
        }
      });

      // Session still ongoing at last entry
      if (sessionStart !== null) {
        sessions.push({ start: sessionStart, end: null, ongoing: true });
      }

      const last20 = sessions.slice(-20).reverse();

      const block = document.createElement('div');
      block.className = 'heatmap-block';

      const title = document.createElement('div');
      title.className = 'heatmap-block-title';
      title.textContent = stationName;
      block.appendChild(title);

      const label = document.createElement('div');
      label.className = 'heatmap-evse-label';
      label.textContent = shortEvseId(evseId);
      block.appendChild(label);

      if (last20.length === 0) {
        const empty = document.createElement('p');
        empty.style.cssText = 'color:var(--muted);font-size:0.85rem;margin:0.5rem 0';
        empty.textContent = 'Sin sesiones registradas.';
        block.appendChild(empty);
      } else {
        const table = document.createElement('table');
        table.style.cssText = 'width:100%;border-collapse:collapse;font-size:0.85rem;margin-top:0.5rem';
        table.innerHTML = `
          <thead>
            <tr style="color:var(--muted);text-align:left;border-bottom:1px solid var(--border)">
              <th style="padding:0.35rem 0.5rem">Inicio</th>
              <th style="padding:0.35rem 0.5rem">Duración</th>
            </tr>
          </thead>`;
        const tbody = document.createElement('tbody');

        last20.forEach(({ start, end, ongoing }) => {
          const startDate = new Date(start);
          const endDate   = end ? new Date(end) : new Date();
          const mins      = Math.round((endDate - startDate) / 60000);
          const h         = Math.floor(mins / 60);
          const m         = mins % 60;
          const durStr    = h > 0 ? `${h}h ${m}min` : `${m}min`;

          const tr = document.createElement('tr');
          tr.style.borderBottom = '1px solid var(--border)';
          tr.innerHTML = `
            <td style="padding:0.35rem 0.5rem">${formatDate(start)}</td>
            <td style="padding:0.35rem 0.5rem">
              ${ongoing
                ? `<span style="color:var(--charging);font-weight:600">En curso (${durStr})</span>`
                : durStr}
            </td>`;
          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        block.appendChild(table);
      }

      container.appendChild(block);
    });
  }

  async function loadData() {
    const el = document.getElementById('last-update');
    try {
      const resp = await fetch(`data/chargers.json?_=${Date.now()}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      el.textContent = `Última actualización: ${formatDate(data.lastUpdate)}`;

      renderStations(data.stations);
      render24h(data.stations, data.history);
      renderHistory(data.stations, data.history);
      renderPriceCharts(data.stations, data.history);
      renderSessions(data.stations, data.history);
    } catch (err) {
      el.textContent = 'No hay datos disponibles aún. Ejecuta fetch_chargers.py para inicializar.';
      document.getElementById('stations').innerHTML =
        '<div class="error-msg">Sin datos. Comprueba que el script de recolección está en marcha.</div>';
    }
  }

  let autoReloadTimer = null;

  function toggleAutoReload() {
    const btn = document.getElementById('autoreload-btn');
    if (autoReloadTimer) {
      clearInterval(autoReloadTimer);
      autoReloadTimer = null;
      btn.textContent = 'Auto-refresco: OFF';
      btn.classList.remove('on');
    } else {
      autoReloadTimer = setInterval(loadData, 5 * 60 * 1000);
      btn.textContent = 'Auto-refresco: ON';
      btn.classList.add('on');
    }
  }

  loadData();
</script>

</body>
</html>
